# Coturn configuration — Control Issue TURN server
# https://github.com/coturn/coturn/wiki/turnserver

# Network
listening-port=3478
tls-listening-port=5349
min-port=${TURN_MIN_PORT:-56000}
max-port=${TURN_MAX_PORT:-56100}
fingerprint
no-cli

# External IP — format: PUBLIC/PRIVATE for Docker NAT environments.
# start-coturn.sh auto-detects the container IP and builds this as PUBLIC/CONTAINER_IP.
external-ip=${TURN_EXTERNAL_IP}

# TURN REST API authentication (RFC 8489 §9.2)
# Credentials are generated server-side with HMAC-SHA1
use-auth-secret
static-auth-secret=${TURN_SECRET}

# Realm — should match the domain serving the TURN server
realm=${TURN_REALM}

# Security: do not allow non-TURN traffic through the relay
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Logging
log-file=stdout
simple-log
