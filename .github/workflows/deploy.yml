name: Deploy to Coolify

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          if ! curl --silent --fail --show-error \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}"; then
            echo "Primary Coolify trigger failed, retrying webhook without Authorization header..."
            curl --silent --fail --show-error \
              --request GET \
              "${{ secrets.COOLIFY_WEBHOOK_URL }}"
          fi
