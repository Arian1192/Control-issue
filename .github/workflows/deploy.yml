name: Deploy to Coolify

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy configuration
        id: validate
        env:
          COOLIFY_API_BASE_URL: ${{ secrets.COOLIFY_API_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_LEGACY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          api_base_url="${COOLIFY_API_BASE_URL:-}"
          if [ -z "${api_base_url}" ]; then
            echo "::error::Missing COOLIFY_API_BASE_URL."
            exit 1
          fi
          api_base_url="${api_base_url%/}"

          api_token="${COOLIFY_API_TOKEN:-${COOLIFY_LEGACY_TOKEN:-}}"
          if [ -z "${api_token}" ]; then
            echo "::error::Missing COOLIFY_API_TOKEN. Temporary fallback to COOLIFY_TOKEN is supported, but both are empty."
            exit 1
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "::error::Missing COOLIFY_APP_UUID."
            exit 1
          fi

          healthcheck_url="${APP_HEALTHCHECK_URL:-}"
          if [ -z "${healthcheck_url}" ]; then
            echo "::error::Missing APP_HEALTHCHECK_URL."
            exit 1
          fi

          echo "::add-mask::${api_token}"
          echo "api_base_url=${api_base_url}" >> "$GITHUB_OUTPUT"
          echo "app_uuid=${COOLIFY_APP_UUID}" >> "$GITHUB_OUTPUT"
          echo "healthcheck_url=${healthcheck_url}" >> "$GITHUB_OUTPUT"

          if [ -z "${COOLIFY_API_TOKEN:-}" ]; then
            echo "::warning::Using deprecated COOLIFY_TOKEN secret fallback. Rotate to COOLIFY_API_TOKEN."
          fi

      - name: Trigger Coolify deployment (official API)
        id: deploy
        env:
          COOLIFY_API_BASE_URL: ${{ steps.validate.outputs.api_base_url }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_LEGACY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ steps.validate.outputs.app_uuid }}
        run: |
          set -euo pipefail

          api_token="${COOLIFY_API_TOKEN:-${COOLIFY_LEGACY_TOKEN:-}}"
          if [ -z "${api_token}" ]; then
            echo "::error::Missing COOLIFY_API_TOKEN and COOLIFY_TOKEN."
            exit 1
          fi

          echo "::add-mask::${api_token}"

          start_utc="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          deploy_url="${COOLIFY_API_BASE_URL}/deploy"

          echo "Triggering Coolify deployment at ${start_utc}"
          echo "API endpoint: ${deploy_url}"
          echo "Target app UUID: ${COOLIFY_APP_UUID}"

          response="$(
            curl --silent --show-error \
              --write-out "\n%{http_code}" \
              --request GET \
              --get "${deploy_url}" \
              --data-urlencode "uuid=${COOLIFY_APP_UUID}" \
              --header "Authorization: Bearer ${api_token}" \
              --header "Accept: application/json"
          )"

          body="$(printf '%s' "${response}" | sed '$d')"
          http_code="$(printf '%s' "${response}" | tail -n1)"

          echo "Coolify HTTP status: ${http_code}"
          echo "Coolify raw response: ${body}"

          if [ "${http_code}" -ge 400 ]; then
            echo "::error::Coolify deployment trigger failed with HTTP ${http_code}."
            exit 1
          fi

          if ! echo "${body}" | jq -e '.deployments | length > 0' >/dev/null 2>&1; then
            echo "::error::Coolify accepted request but did not return deployment UUIDs."
            exit 1
          fi

          deployment_uuid="$(echo "${body}" | jq -r '.deployments[0].deployment_uuid // empty')"
          resource_uuid="$(echo "${body}" | jq -r '.deployments[0].resource_uuid // empty')"
          message="$(echo "${body}" | jq -r '.deployments[0].message // "Deployment queued"')"

          if [ -z "${deployment_uuid}" ]; then
            echo "::error::Missing deployment UUID in Coolify response."
            exit 1
          fi

          echo "deployment_uuid=${deployment_uuid}" >> "$GITHUB_OUTPUT"
          echo "resource_uuid=${resource_uuid}" >> "$GITHUB_OUTPUT"
          echo "message=${message}" >> "$GITHUB_OUTPUT"
          echo "start_utc=${start_utc}" >> "$GITHUB_OUTPUT"

      - name: Smoke test app endpoint (required)
        env:
          APP_HEALTHCHECK_URL: ${{ steps.validate.outputs.healthcheck_url }}
        run: |
          set -euo pipefail

          attempts=72
          delay_seconds=10
          success=0

          echo "Running smoke check for ${APP_HEALTHCHECK_URL}"

          for attempt in $(seq 1 "${attempts}"); do
            tmp_headers="$(mktemp)"
            tmp_body="$(mktemp)"

            http_code="$(
              curl --silent --show-error --location \
                --max-time 20 \
                --dump-header "${tmp_headers}" \
                --output "${tmp_body}" \
                --write-out "%{http_code}" \
                "${APP_HEALTHCHECK_URL}" || true
            )"

            if echo "${http_code}" | grep -Eq '^(2|3)[0-9][0-9]$' \
              && grep -Eiq '<!doctype html|<div id="root"></div>|<title>Control Issue</title>' "${tmp_body}"; then
              echo "Smoke check passed on attempt ${attempt} with HTTP ${http_code}."
              success=1
              rm -f "${tmp_headers}" "${tmp_body}"
              break
            fi

            echo "Attempt ${attempt}/${attempts} failed (HTTP ${http_code}). Retrying in ${delay_seconds}s..."
            echo "Response headers:"
            sed -n '1,20p' "${tmp_headers}" || true
            echo "Response body snippet:"
            sed -n '1,40p' "${tmp_body}" || true

            rm -f "${tmp_headers}" "${tmp_body}"
            sleep "${delay_seconds}"
          done

          if [ "${success}" -ne 1 ]; then
            echo "::error::Smoke check failed after $((attempts * delay_seconds)) seconds."
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Coolify deployment result"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Deployment UUID: \`${{ steps.deploy.outputs.deployment_uuid || 'N/A' }}\`"
            echo "- Resource UUID: \`${{ steps.deploy.outputs.resource_uuid || 'N/A' }}\`"
            echo "- Triggered at (UTC): \`${{ steps.deploy.outputs.start_utc || 'N/A' }}\`"
            echo "- Coolify message: \`${{ steps.deploy.outputs.message || 'N/A' }}\`"
            echo "- Healthcheck URL: \`${{ steps.validate.outputs.healthcheck_url || 'N/A' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
