services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_RUSTDESK_ID_SERVER: ${VITE_RUSTDESK_ID_SERVER:-}
        VITE_RUSTDESK_RELAY_SERVER: ${VITE_RUSTDESK_RELAY_SERVER:-}
        VITE_RUSTDESK_KEY: ${VITE_RUSTDESK_KEY:-}
        VITE_RUSTDESK_WEB_CLIENT_URL: ${VITE_RUSTDESK_WEB_CLIENT_URL:-}
        VITE_RUSTDESK_WEB_CLIENT_TEMPLATE: ${VITE_RUSTDESK_WEB_CLIENT_TEMPLATE:-}
        VITE_RUSTDESK_DOWNLOAD_WINDOWS_URL: ${VITE_RUSTDESK_DOWNLOAD_WINDOWS_URL:-}
        VITE_RUSTDESK_DOWNLOAD_MAC_INTEL_URL: ${VITE_RUSTDESK_DOWNLOAD_MAC_INTEL_URL:-}
        VITE_RUSTDESK_DOWNLOAD_MAC_ARM_URL: ${VITE_RUSTDESK_DOWNLOAD_MAC_ARM_URL:-}
        VITE_RUSTDESK_DOWNLOAD_LINUX_URL: ${VITE_RUSTDESK_DOWNLOAD_LINUX_URL:-}
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - internal

  rustdesk-hbbs:
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r ${RUSTDESK_RELAY_HOST:-rd.tudominio.com:21117} -k ${RUSTDESK_KEY}
    environment:
      - ALWAYS_USE_RELAY=${RUSTDESK_ALWAYS_USE_RELAY:-N}
    volumes:
      - rustdesk-data-v1:/root
    restart: unless-stopped
    ports:
      - '21115:21115'
      - '21116:21116'
      - '21116:21116/udp'
      - '21118:21118'
    networks:
      - internal

  rustdesk-hbbr:
    image: rustdesk/rustdesk-server:latest
    command: hbbr -k ${RUSTDESK_KEY}
    volumes:
      - rustdesk-data-v1:/root
    restart: unless-stopped
    ports:
      - '21117:21117'
      - '21119:21119'
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  rustdesk-data-v1:
