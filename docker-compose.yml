services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
    restart: unless-stopped
    networks:
      - internal

  coturn:
    build:
      context: .
      dockerfile: docker/coturn/Dockerfile
    restart: unless-stopped
    # TURN relay candidates must be published from the host network namespace.
    # Docker bridge/NAT makes browsers see the container IP (for example 10.0.3.3)
    # instead of the public relay address, which breaks WAN ICE checks.
    network_mode: host
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - TURN_REALM=${TURN_REALM}
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP}
      - TURN_MIN_PORT=${TURN_MIN_PORT:-56000}
      - TURN_MAX_PORT=${TURN_MAX_PORT:-56100}

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
