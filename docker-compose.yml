services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_MESHCENTRAL_URL: ${VITE_MESHCENTRAL_URL:-}
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - internal

  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    restart: unless-stopped
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - ./meshcentral/config.json:/opt/meshcentral/meshcentral-data/config.json:ro
    environment:
      - NODE_ENV=production
      - HOSTNAME=${MESHCENTRAL_HOSTNAME:-localhost}
    expose:
      - '443'
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
      - meshcentral
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  meshcentral-data:
  meshcentral-files:
